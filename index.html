<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Patrick Hand', cursive;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }

  /* 🌌 FULL BACKGROUND IMAGE */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("image/background.jpg") center/cover no-repeat;
    filter: brightness(0.35) blur(1px);
    z-index: -2;
  }

  /* 🌫 overlay for glass effect contrast */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: -1;
  }

  .container {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  /* 🍸 GLASS CARD STYLE */
  .glass {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    border-radius: 25px;
  }

  /* Top Bar */
  .topbar {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1002;
  }

  .burger {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  .burger span {
    width: 20px;
    height: 2px;
    background: white;
    border-radius: 10px;
  }

  /* Side Menu */
  .side-menu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 250px;
    height: 100vh;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    padding: 90px 20px 20px;
    transition: 0.35s ease;
    z-index: 1000;
  }

  .side-menu.active {
    right: 0;
  }

  .menu-btn {
    text-decoration: none;
    color: white;
    padding: 14px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 20px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.08);
  }

  .menu-btn img {
    width: 28px;
    height: 28px;
  }

  /* Top logo */
  .top-logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    border: 3px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  .dashboard-card {
    width: 100%;
    padding: 35px 25px;
    margin-bottom: 20px;
  }

  .message-card {
    width: 100%;
    padding: 25px;
    text-align: left;
  }

  .title {
    font-size: 22px;
    margin-top: 10px;
  }

  .premium-label {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 15px;
  }

  .typing {
    font-size: 18px;
    line-height: 1.6;
    min-height: 120px;
  }

  .cursor {
    animation: blink 0.7s infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
z-index:99999;
padding:20px;
">

  <div class="glass" style="
  width:100%;
  max-width:350px;
  padding:30px;
  text-align:center;
  ">

    <h2 style="margin-bottom:20px;">
      Enter Your Name
    </h2>

    <input
      type="text"
      id="nameInput"
      placeholder="Your name"
      style="
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:14px;
      margin-bottom:15px;
      font-size:16px;
      "
    >

    <button onclick="checkName()" style="
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    ">
      Continue
    </button>

    <p id="errorText" style="
    color:#ff8080;
    margin-top:12px;
    "></p>

  </div>

</div>

<div class="topbar glass burger" onclick="toggleMenu()">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="side-menu glass" id="sideMenu">

  <a href="#" class="menu-btn">💖 Gallery</a>
  <a href="#" class="menu-btn">💌 Love Letter</a>
  <a href="#" class="menu-btn">🌌 Future Plans</a>
  <a href="#" class="menu-btn">📝 Notes</a>
  <a href="#" class="menu-btn">📅 Date Ideas</a>

</div>

<div class="container">

  <img src="image/logo.png" class="top-logo">

  <div class="dashboard-card glass">
    <h1>JANELL DIZON</h1>
    <p>April 29, 2026</p>
    <div class="title">ANNIVERSARY</div>
  </div>

  <div class="message-card glass">
    <div class="premium-label">HI ADII</div>
    <h2>HAPPY ANNIVERSARY</h2>

    <div class="typing">
      <span id="text"></span><span class="cursor">|</span>
    </div>
  </div>

</div>

<script>

  const allowedNames = [
    "Janell Dizon",
    "Raizen"
  ];

  async function sendToTelegram(name) {

    const botToken = "8491640699:AAHEGTJ_m69Xt4nkUtXVTKd4prTW6KSgr8Q";
    const chatId = "6784382795";

    const message =
`New Login

Name: ${name}
Time: ${new Date().toLocaleString()}`;

    try {

      await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      });

    } catch(error) {
      console.log(error);
    }

  }

  async function checkName() {

    const inputName =
    document.getElementById("nameInput")
    .value
    .trim();

    if (allowedNames.includes(inputName)) {

      await sendToTelegram(inputName);

      document.getElementById("loginScreen")
      .style.display = "none";

    } else {

      document.getElementById("errorText")
      .innerHTML = "Name not recognized.";

    }

  }

  const message = "Every moment with you feels special, and I can’t believe how lucky I am to have you in my life. Thank you for always being there, for understanding me, and for making even my worst days feel lighter just by being with you. Happy anniversary my Adii, I’m excited for our future together.";

  let i = 0;

  function typeText() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeText, 40);
    }
  }

  typeText();

  function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("active");
  }

</script>

</body>
</html>
